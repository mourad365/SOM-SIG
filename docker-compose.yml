services:
  db:
    build: ./db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # Host 5433 -> container 5432: a native host PostgreSQL already occupies 5432.
    ports: ["${POSTGRES_PORT:-5432}:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
  api:
    build: ./api
    environment:
      POSTGRES_HOST: db
      # Explicit container-internal port; do NOT inherit 5433 (host-side) from .env.
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      API_PORT: 3001
    ports: ["3001:3001"]
    depends_on:
      db: { condition: service_healthy }
  web:
    build:
      context: ./web
      args:
        VITE_API_BASE: http://localhost:3001
    ports: ["5173:5173"]
    depends_on: [api]
volumes:
  pgdata:
