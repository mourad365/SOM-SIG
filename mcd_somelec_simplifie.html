<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCD simplifié - SIG SOMELEC - Pilote Nouakchott</title>
<style>
  body { font-family: Arial, Helvetica, sans-serif; background:#fff; color:#1a1a1a; margin:0; padding:24px; }
  h1 { font-size:20px; font-weight:600; margin:0 0 4px; }
  p.sub { font-size:13px; color:#555; margin:0 0 20px; }
  #erd { overflow-x:auto; }
  #erd svg .entityLabel, #erd svg .entityLabel * { fill:#1a1a1a !important; }
  #erd svg text { fill:#1a1a1a !important; }
  #erd svg .relationshipLabel { fill:#333 !important; }
  #erd svg .relationshipLabelBox { fill:#fff !important; opacity:.9 !important; }
  #erd svg .row-rect-odd path, #erd svg .row-rect-odd rect,
  #erd svg .row-rect-even path, #erd svg .row-rect-even rect { stroke:none !important; }
</style>
</head>
<body>
<h1>MCD simplifié — SIG SOMELEC (pilote Nouakchott)</h1>
<p class="sub">7 tables. Chaîne : POSTE → TRANSFORMATEUR → POINT_SERVICE → ABONNE. PK = clé primaire, FK = clé étrangère, geom = géométrie PostGIS (SRID 32628).</p>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
mermaid.initialize({
  startOnLoad:false, theme:'base',
  fontFamily:'Arial, Helvetica, sans-serif',
  themeVariables:{
    darkMode:false, fontSize:'13px', fontFamily:'Arial, Helvetica, sans-serif',
    primaryColor:'#eef0ff', primaryBorderColor:'#7b78d6', primaryTextColor:'#1a1a1a',
    lineColor:'#666', textColor:'#1a1a1a',
    attributeBackgroundColorOdd:'#f7f7fb', attributeBackgroundColorEven:'#eef0f7'
  }
});
const def = `erDiagram
  NIVEAU_TENSION ||--o{ POSTE : "primaire/secondaire"
  NIVEAU_TENSION ||--o{ TRANSFORMATEUR : "primaire/secondaire"
  NIVEAU_TENSION ||--o{ LIGNE : "classe"
  POSTE ||--o{ TRANSFORMATEUR : "contient"
  TRANSFORMATEUR ||--o{ POINT_SERVICE : "alimente"
  ABONNE ||--o{ POINT_SERVICE : "possede"
  NIVEAU_TENSION {
    string code_tension PK
    string libelle
    string valeur
  }
  POSTE {
    int poste_id PK
    string code_poste
    string nom
    string type_poste
    string tension_primaire FK
    string tension_secondaire FK
    date date_mise_service
    string statut
    geometry geom
  }
  TRANSFORMATEUR {
    int transfo_id PK
    string code_actif
    string type_transfo
    int poste_id FK
    numeric puissance_kva
    string tension_primaire FK
    string tension_secondaire FK
    date date_mise_service
    string etat
    string statut
    geometry geom
  }
  LIGNE {
    int ligne_id PK
    string code_actif
    string niveau_tension FK
    string type_pose
    numeric section_mm2
    numeric longueur_m
    string statut
    date date_mise_service
    geometry geom
  }
  SUPPORT {
    int support_id PK
    string code_actif
    string type_support
    numeric hauteur_m
    string etat
    geometry geom
  }
  ABONNE {
    int abonne_id PK
    string num_contrat
    string nom
    string type_tarif
  }
  POINT_SERVICE {
    int point_id PK
    string num_compteur
    int abonne_id FK
    int transfo_id FK
    string type_compteur
    numeric puiss_souscrite_kw
    date date_pose
    string statut
    geometry geom
  }`;
const { svg } = await mermaid.render('erd-svg', def);
document.getElementById('erd').innerHTML = svg;
document.querySelectorAll('#erd svg .node').forEach(node => {
  const fp = node.querySelector('path[d]'); if(!fp) return;
  const nums = fp.getAttribute('d').match(/-?[\d.]+/g)?.map(Number);
  if(!nums || nums.length<8) return;
  const xs=[nums[0],nums[2],nums[4],nums[6]], ys=[nums[1],nums[3],nums[5],nums[7]];
  const x=Math.min(...xs), y=Math.min(...ys), w=Math.max(...xs)-x, h=Math.max(...ys)-y;
  const r=document.createElementNS('http://www.w3.org/2000/svg','rect');
  r.setAttribute('x',x); r.setAttribute('y',y); r.setAttribute('width',w); r.setAttribute('height',h); r.setAttribute('rx','8');
  for(const a of ['fill','stroke','stroke-width','class','style']) if(fp.hasAttribute(a)) r.setAttribute(a,fp.getAttribute(a));
  fp.replaceWith(r);
});
</script>
</body>
</html>
